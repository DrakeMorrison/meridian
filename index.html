<title>Meridian</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1d2021;
    --surface: #282828;
    --surface2: #32302f;
    --border: #3c3836;
    --text: #ebdbb2;
    --text-dim: #d5c4a1;
    --muted: #7c6f64;
    --accent: #b8bb26;
    --accent-dim: #98971a;
    --accent2: #fabd2f;
    --accent2-dim: #d79921;
    --danger: #fb4934;
    --danger-dim: #cc241d;
    --info: #83a598;
    --mono: 'IBM Plex Mono', monospace;
    --display: 'Cinzel', serif;
    --data: 'Cormorant Garamond', serif;
  }

  body.light {
    --bg: #fbf1c7;
    --surface: #f2e5bc;
    --surface2: #ebdbb2;
    --border: #d5c4a1;
    --text: #3c3836;
    --text-dim: #504945;
    --muted: #928374;
    --accent: #98971a;
    --accent-dim: #79740e;
    --accent2: #d79921;
    --accent2-dim: #b57614;
    --danger: #cc241d;
    --danger-dim: #9d0006;
    --info: #458588;
  }

  body {
    font-family: var(--mono);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  #bg-canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 0;
    opacity: 0;
    transition: opacity 1s ease;
  }
  #bg-canvas.active { opacity: 1; }
  body.graph-mode .app { opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
  body.graph-mode #bg-canvas { opacity: 1 !important; }
  body.has-graph #bg-canvas { pointer-events: auto; cursor: pointer; }
  #graph-tooltip {
    position: fixed;
    pointer-events: none;
    display: none;
    background: color-mix(in srgb, var(--bg) 90%, transparent);
    border: 1px solid var(--border);
    padding: 0.5rem 0.75rem;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text);
    line-height: 1.6;
    backdrop-filter: blur(6px);
    z-index: 10;
    max-width: 260px;
  }
  #graph-tooltip .tt-task { color: var(--text); margin-bottom: 0.15rem; font-size: 12px; }
  #graph-tooltip .tt-meta { color: var(--muted); }
  #graph-tooltip .tt-delta { margin-top: 0.15rem; }
  #graph-tooltip .tt-delta.over  { color: var(--danger); }
  #graph-tooltip .tt-delta.under { color: var(--accent2); }
  #graph-tooltip .tt-delta.exact { color: var(--muted); }

  .app {
    position: relative;
    z-index: 1;
    max-width: 640px;
    margin: 0 auto;
    padding: 2rem 1.5rem 4rem;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    gap: 0;
    transition: background 0.3s ease, backdrop-filter 0.3s ease;
  }

  .app:hover {
    background: color-mix(in srgb, var(--bg) 50%, transparent);
    backdrop-filter: blur(3px);
  }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding-bottom: 2rem;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2.5rem;
  }

  .logo {
    font-family: var(--display);
    font-size: 13px;
    letter-spacing: 0.3em;
    color: var(--accent2);
    text-transform: uppercase;
  }

  .header-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    font-family: var(--display);
  }

  .section-label {
    font-family: var(--display);
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.75rem;
  }

  .input-block {
    margin-bottom: 1.5rem;
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    padding: 0.6rem 0;
    font-size: 1.1rem;
    outline: none;
    transition: border-color 0.2s;
    caret-color: var(--accent);
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-bottom-color: var(--accent2);
  }
  input[type="text"]::placeholder, input[type="number"]::placeholder {
    color: var(--muted);
    font-size: 0.9rem;
  }
  input:disabled {
    opacity: 0.4;
    pointer-events: none;
  }

  .time-row {
    display: flex;
    gap: 1rem;
    align-items: flex-end;
    margin-bottom: 1.5rem;
  }
  .time-row .input-block { flex: 1; margin-bottom: 0; }

  .btn {
    font-family: var(--mono);
    font-size: 10px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
    cursor: pointer;
    text-transform: uppercase;
    transition: color 0.15s, border-color 0.15s;
  }
  .btn:hover { color: var(--text); border-color: var(--muted); }

  .start-btn {
    font-size: 11px;
    letter-spacing: 0.2em;
    padding: 0.6rem 1.4rem;
    background: var(--accent2);
    color: #1d2021;
    border: none;
    transition: opacity 0.15s, transform 0.1s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .start-btn:hover { opacity: 0.88; }
  .start-btn:active { transform: scale(0.97); }
  .start-btn:disabled { opacity: 0.3; cursor: default; transform: none; }

  .timer-display {
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 3rem 0 2rem;
    background: color-mix(in srgb, var(--bg) 85%, transparent);
    backdrop-filter: blur(4px);
    border: 1px solid var(--border);
    margin-bottom: 1.5rem;
    position: relative;
  }
  .timer-display.visible { display: flex; }

  .task-label {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.15em;
    font-family: var(--mono);
    margin-bottom: 1.5rem;
    text-transform: uppercase;
    max-width: 90%;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .time-digits {
    font-family: var(--mono);
    font-size: clamp(3rem, 12vw, 5.5rem);
    font-weight: 700;
    letter-spacing: -0.02em;
    line-height: 1;
    color: var(--accent);
    transition: color 0.5s;
  }
  .time-digits.over { color: var(--danger); }

  .predicted-bar {
    position: relative;
    width: 80%;
    height: 2px;
    background: var(--border);
    margin: 1.5rem 0;
  }
  .predicted-marker {
    position: absolute;
    top: -3px;
    width: 2px;
    height: 8px;
    background: var(--muted);
    left: 100%;
    transition: left 0.5s linear;
  }
  .elapsed-fill {
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    background: var(--accent);
    transition: width 0.5s linear, background 0.5s;
    max-width: none;
  }
  .elapsed-fill.over { background: var(--danger); }

  .timer-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  .stop-btn {
    margin-top: 2rem;
    font-size: 11px;
    letter-spacing: 0.2em;
    padding: 0.75rem 2.5rem;
    color: var(--danger);
    border-color: var(--danger);
    transition: background 0.15s, color 0.15s;
  }
  .stop-btn:hover { background: var(--danger); color: #000; }

  .result-panel {
    display: none;
    border: 1px solid var(--border);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    background: color-mix(in srgb, var(--bg) 92%, transparent);
    backdrop-filter: blur(4px);
    animation: fadeIn 0.4s ease;
  }
  .result-panel.visible { display: block; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  @keyframes entryHighlight { 0% { box-shadow: none; } 20% { box-shadow: 0 0 18px 8px var(--entry-halo); } 100% { box-shadow: none; } }
  .log-entry-highlight { animation: entryHighlight 1.5s ease forwards !important; }

  .result-task {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.1em;
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  .result-delta {
    font-family: var(--mono);
    font-size: 3rem;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 0.5rem;
  }
  .result-delta.under { color: var(--accent); }
  .result-delta.over { color: var(--danger); }
  .result-delta.exact { color: var(--accent2); }

  .result-subline {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1.5rem;
    font-family: var(--mono);
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
  }

  .result-cell {
    background: var(--surface2);
    padding: 0.75rem 1rem;
    border: 1px solid var(--border);
  }
  .result-cell .rc-label {
    font-size: 10px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
  }
  .result-cell .rc-val {
    font-size: 14px;
    font-family: var(--mono);
    color: var(--text);
  }

  .result-actions {
    display: flex;
    gap: 0.75rem;
  }

  .btn-ghost {
    font-size: 11px;
    letter-spacing: 0.15em;
    padding: 0.5rem 1rem;
    flex: 1;
  }

  .section-divider {
    height: 1px;
    background: var(--border);
    margin: 2rem 0;
  }

  .log-section { margin-top: 1rem; }

  .log-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .log-count {
    font-family: var(--display);
    font-size: 11px;
    color: var(--muted);
  }

  .log-actions {
    display: flex;
    gap: 0.5rem;
  }

  .btn-tiny {
    letter-spacing: 0.1em;
    padding: 0.3rem 0.7rem;
  }
  .btn-tiny.accent { color: var(--accent2); border-color: var(--accent2-dim); }
  .btn-tiny.accent:hover { background: var(--accent2); color: #1d2021; }

  .log-empty {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    padding: 2rem 0;
    text-align: center;
    letter-spacing: 0.1em;
  }

  .log-entry {
    border-bottom: 1px solid var(--border);
    padding: 1rem 0;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.5rem;
    align-items: start;
    animation: fadeIn 0.3s ease;
  }

  .log-task {
    font-family: var(--data);
    font-size: 16px;
    color: var(--text);
    margin-bottom: 0.3rem;
    line-height: 1.4;
  }

  .log-meta {
    font-family: var(--data);
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }

  .log-delta {
    font-family: var(--data);
    font-size: 15px;
    font-weight: 600;
    text-align: right;
    padding-top: 3px;
  }
  .log-delta.under { color: var(--accent); }
  .log-delta.over { color: var(--danger); }
  .log-delta.exact { color: var(--accent2); }

  .entry-actions {
    display: flex;
    gap: 0.4rem;
    margin-top: 0.5rem;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .log-entry:hover .entry-actions,
  .log-entry:focus-within .entry-actions { opacity: 1; }
  .log-entry-editing { grid-template-columns: 1fr; }
  .btn-tiny.danger { color: var(--danger); border-color: var(--danger-dim); }
  .btn-tiny.danger:hover { background: var(--danger); color: #1d2021; }
  .edit-input-task { font-size: 0.95rem; margin-bottom: 0.5rem; }
  .edit-input-num  { font-size: 0.9rem; }
  .log-edit-label {
    font-family: var(--display);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.25rem;
  }
  .log-edit-fields {
    display: flex;
    gap: 1.5rem;
  }
  .log-edit-fields > div { flex: 1; }
  .log-edit-actions {
    display: flex;
    gap: 0.5rem;
    margin-top: 0.75rem;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    margin-bottom: 2rem;
  }

  .stat-card {
    background: var(--surface2);
    padding: 0.75rem 1rem;
    text-align: center;
    border: 1px solid var(--border);
  }
  .stat-card .s-val {
    font-family: var(--data);
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
    line-height: 1;
    margin-bottom: 0.3rem;
  }
  .stat-card .s-label {
    font-family: var(--display);
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }

  .auto-export-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 0;
    border-top: 1px solid var(--border);
    margin-top: 1rem;
  }

  .toggle-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    flex: 1;
  }

  .toggle {
    width: 36px;
    height: 20px;
    background: var(--border);
    border-radius: 10px;
    position: relative;
    cursor: pointer;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle::after {
    content: '';
    position: absolute;
    top: 3px;
    left: 3px;
    width: 14px;
    height: 14px;
    background: var(--muted);
    border-radius: 50%;
    transition: transform 0.2s, background 0.2s;
  }
  .toggle.on { background: var(--accent-dim); }
  .toggle.on::after { transform: translateX(16px); background: var(--accent); }

  .export-note {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    line-height: 1.5;
    padding: 0.5rem 0 0;
  }

  .file-handle-status {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--info);
    letter-spacing: 0.1em;
    margin-top: 0.25rem;
  }

  .theme-btn {
    letter-spacing: 0.15em;
    padding: 0.3rem 0.7rem;
    transition: color 0.2s, border-color 0.2s, background 0.2s;
    line-height: 1.4;
  }
  .key { text-decoration: underline; text-decoration-color: var(--muted); text-underline-offset: 2px; }

  footer {
    margin-top: auto;
    padding-top: 3rem;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    letter-spacing: 0.1em;
  }

  .pulse { animation: pulse 1s ease-in-out infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<div id="graph-tooltip"></div>

<div class="app">
  <header>
    <div class="logo">MERIDIAN</div>
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <div class="header-sub">time · calibration</div>
<button class="btn theme-btn" id="theme-btn" onclick="toggleTheme()">&#9788; Light</button>
    </div>
  </header>

  <div id="input-section">
    <div class="input-block">
      <div class="section-label">Task</div>
      <input type="text" id="task-input" placeholder="What are you doing?" autocomplete="off" />
    </div>
    <div class="time-row">
      <div class="input-block">
        <div class="section-label">Estimate (min)</div>
        <input type="number" id="estimate-input" placeholder="30" min="0.1" step="0.5" />
      </div>
      <button class="btn start-btn" id="start-btn" onclick="startTimer()">START ↵</button>
    </div>
  </div>

  <div class="timer-display" id="timer-display">
    <div class="task-label" id="running-task-label"></div>
    <div class="time-digits" id="time-digits">00:00</div>
    <div class="predicted-bar">
      <div class="elapsed-fill" id="elapsed-fill"></div>
      <div class="predicted-marker" id="predicted-marker"></div>
    </div>
    <div class="timer-meta" id="timer-meta">est. — min</div>
    <button class="btn stop-btn" onclick="stopTimer()"><span class="key">S</span>TOP</button>
  </div>

  <div class="result-panel" id="result-panel">
    <div class="result-task" id="result-task-label"></div>
    <div class="result-delta" id="result-delta"></div>
    <div class="result-subline" id="result-subline"></div>
    <div class="result-grid">
      <div class="result-cell">
        <div class="rc-label">Predicted</div>
        <div class="rc-val" id="res-predicted"></div>
      </div>
      <div class="result-cell">
        <div class="rc-label">Actual</div>
        <div class="rc-val" id="res-actual"></div>
      </div>
      <div class="result-cell">
        <div class="rc-label">Started</div>
        <div class="rc-val" id="res-start"></div>
      </div>
      <div class="result-cell">
        <div class="rc-label">Ended</div>
        <div class="rc-val" id="res-end"></div>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn btn-ghost" onclick="clearResult()"><span class="key">N</span>EW TASK</button>
    </div>
  </div>

  <div class="log-section">
    <div class="log-header">
      <div>
        <div class="section-label" style="margin-bottom:0">Session Log</div>
        <div class="log-count" id="log-count">0 entries</div>
      </div>
      <div class="log-actions">
        <button class="btn btn-tiny accent" onclick="exportLog()">↓ <span class="key">E</span>xport CSV</button>
        <button class="btn btn-tiny accent" onclick="document.getElementById('import-input').click()">↑ <span class="key">I</span>mport CSV</button>
        <input type="file" id="import-input" accept=".csv" style="display:none" onchange="importCSV(this)">
        <button class="btn btn-tiny" onclick="clearLog()"><span class="key">C</span>lear</button>
      </div>
    </div>

    <div class="stats-row" id="stats-row" style="display:none">
      <div class="stat-card">
        <div class="s-val" id="stat-count">0</div>
        <div class="s-label">Tasks</div>
      </div>
      <div class="stat-card">
        <div class="s-val" id="stat-avg">—</div>
        <div class="s-label">Avg Delta</div>
      </div>
      <div class="stat-card">
        <div class="s-val" id="stat-bias">—</div>
        <div class="s-label">Brier Score</div>
      </div>
    </div>

    <div id="log-list">
      <div class="log-empty">No sessions yet.<br>Start a task to begin tracking.</div>
    </div>

    <div class="auto-export-row">
      <div class="toggle-label">Auto-backup</div>
      <div class="toggle" id="backup-toggle" onclick="toggleBackup()"></div>
    </div>
    <div id="backup-settings" style="display:none">
      <div style="display:flex; gap:0.5rem; margin-bottom:0.75rem;">
        <button class="btn btn-tiny" id="freq-daily" onclick="setBackupFreq('daily')">Daily</button>
        <button class="btn btn-tiny" id="freq-weekly" onclick="setBackupFreq('weekly')">Weekly</button>
      </div>
      <div class="export-note" id="backup-note"></div>
      <div class="file-handle-status" id="backup-dir-status"></div>
      <div style="margin-top:0.75rem;">
        <button class="btn btn-tiny accent" onclick="runBackupNow()">&#x2193; Backup Now</button>
      </div>
    </div>

    <div id="backup-reminder" style="display:none; margin-top:1rem; padding:0.75rem 1rem; border:1px solid var(--accent2-dim); background:rgba(215,153,33,0.08);">
      <div style="font-family:var(--mono); font-size:11px; color:var(--accent2); letter-spacing:0.1em; margin-bottom:0.4rem;">BACKUP REMINDER</div>
      <div style="font-family:var(--mono); font-size:11px; color:var(--text-dim);" id="reminder-text"></div>
      <div style="display:flex; gap:0.5rem; margin-top:0.75rem;">
        <button class="btn btn-tiny accent" onclick="runBackupNow()">&#x2193; Backup Now</button>
        <button class="btn btn-tiny" onclick="snoozeReminder()">Remind Later</button>
        <button class="btn btn-tiny" onclick="dismissReminder()">Dismiss</button>
      </div>
    </div>
  </div>

  <footer>all data stored locally · no server · no cloud</footer>
</div>

<script>
const DB_KEY = 'meridian_logs';
let logs = JSON.parse(localStorage.getItem(DB_KEY) || '[]');
let timerInterval = null;
let timerNotified = false;
let fibTimeout = null;
let fibA = 1, fibB = 1;
let editingIndex = -1;
let startTime = null;
let predictedMs = 0;
let currentTask = '';
let bgAnimFrame = null;

const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');

function saveLogs() {
  localStorage.setItem(DB_KEY, JSON.stringify(logs));
}

function formatDuration(ms) {
  const totalSec = Math.abs(Math.floor(ms / 1000));
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function formatTime(ts) {
  return new Date(ts).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
}

function formatDateShort(ts) {
  return new Date(ts).toLocaleDateString([], {month:'short', day:'numeric'});
}


function startTimer() {
  const taskEl = document.getElementById('task-input');
  const estEl = document.getElementById('estimate-input');
  const task = taskEl.value.trim();
  const estMin = parseFloat(estEl.value);

  if (!task || !estMin || estMin <= 0) {
    if (!task) taskEl.style.borderBottomColor = 'var(--danger)';
    if (!estMin || estMin <= 0) estEl.style.borderBottomColor = 'var(--danger)';
    setTimeout(() => {
      taskEl.style.borderBottomColor = '';
      estEl.style.borderBottomColor = '';
    }, 1500);
    return;
  }

  currentTask = task;
  predictedMs = estMin * 60 * 1000;
  startTime = Date.now();

  document.getElementById('input-section').style.display = 'none';
  document.getElementById('task-input').disabled = true;
  document.getElementById('estimate-input').disabled = true;
  document.getElementById('start-btn').disabled = true;
  document.getElementById('result-panel').classList.remove('visible');

  document.getElementById('running-task-label').textContent = task.toUpperCase();
  document.getElementById('timer-meta').textContent = `est. ${estMin} min`;
  document.getElementById('timer-display').classList.add('visible');

  timerNotified = false;
  Notification.requestPermission();

  startBackgroundGraph();
  updateTimerDisplay();
  timerInterval = setInterval(updateTimerDisplay, 500);
}

function updateTimerDisplay() {
  const elapsed = Date.now() - startTime;
  const remaining = predictedMs - elapsed;
  const isOver = remaining < 0;

  const digits = document.getElementById('time-digits');
  if (isOver) {
    digits.textContent = '-' + formatDuration(Math.abs(remaining));
    digits.classList.add('over');
    if (!timerNotified && Notification.permission === 'granted') {
      timerNotified = true;
      const n = new Notification('Meridian', { body: `Time's up: ${currentTask}` });
      n.onclick = () => window.focus();
      fibA = 1; fibB = 1;
      scheduleFibNotification();
    }
  } else {
    digits.textContent = formatDuration(remaining);
    digits.classList.remove('over');
  }

  const fill = document.getElementById('elapsed-fill');
  const pct = Math.min((elapsed / predictedMs) * 100, 100);
  fill.style.width = pct + '%';
  if (isOver) fill.classList.add('over'); else fill.classList.remove('over');

  const marker = document.getElementById('predicted-marker');
  marker.style.left = '100%';
}

function scheduleFibNotification() {
  const delayMs = fibA * 60 * 1000;
  const next = fibA + fibB;
  fibA = fibB;
  fibB = next;
  fibTimeout = setTimeout(() => {
    if (Notification.permission === 'granted') {
      const n = new Notification('Meridian', { body: `Still going: ${currentTask}` });
      n.onclick = () => window.focus();
    }
    scheduleFibNotification();
  }, delayMs);
}

function stopTimer() {
  if (!timerInterval) return;
  clearInterval(timerInterval);
  timerInterval = null;
  clearTimeout(fibTimeout);
  fibTimeout = null;

  const endTime = Date.now();
  const actualMs = endTime - startTime;
  const diffMs = actualMs - predictedMs;
  const pct = ((diffMs / predictedMs) * 100);

  const entry = {
    id: Date.now(),
    task: currentTask,
    predictedMs,
    actualMs,
    startTime,
    endTime,
    pctDiff: pct
  };

  logs.unshift(entry);
  saveLogs();

  showResult(entry);
  renderLog();
  stopBackgroundGraph();

  document.getElementById('timer-display').classList.remove('visible');
  document.getElementById('task-input').disabled = false;
  document.getElementById('estimate-input').disabled = false;
  document.getElementById('start-btn').disabled = false;

}

function showResult(entry) {
  const pct = entry.pctDiff;
  const panel = document.getElementById('result-panel');
  const delta = document.getElementById('result-delta');
  const sub = document.getElementById('result-subline');

  document.getElementById('result-task-label').textContent = entry.task.toUpperCase();

  const sign = pct > 0 ? '+' : '';
  delta.textContent = sign + pct.toFixed(1) + '%';
  delta.className = 'result-delta ' + (Math.abs(pct) < 2 ? 'exact' : pct > 0 ? 'over' : 'under');

  if (Math.abs(pct) < 2) {
    sub.textContent = 'nearly perfect estimate';
  } else if (pct > 0) {
    sub.textContent = `ran ${Math.abs(pct).toFixed(1)}% over — took longer than expected`;
  } else {
    sub.textContent = `finished ${Math.abs(pct).toFixed(1)}% faster than expected`;
  }

  document.getElementById('res-predicted').textContent = formatDuration(entry.predictedMs);
  document.getElementById('res-actual').textContent = formatDuration(entry.actualMs);
  document.getElementById('res-start').textContent = formatTime(entry.startTime);
  document.getElementById('res-end').textContent = formatTime(entry.endTime);

  panel.classList.add('visible');
}

function clearResult() {
  document.getElementById('result-panel').classList.remove('visible');
  document.getElementById('input-section').style.display = '';
  document.getElementById('task-input').value = '';
  document.getElementById('estimate-input').value = '';
  document.getElementById('task-input').focus();
}

function renderLog() {
  const list = document.getElementById('log-list');
  const count = document.getElementById('log-count');
  const statsRow = document.getElementById('stats-row');

  document.body.classList.toggle('has-graph', logs.length >= 2);
  count.textContent = logs.length + ' ' + (logs.length === 1 ? 'entry' : 'entries');

  if (logs.length === 0) {
    list.innerHTML = '<div class="log-empty">No sessions yet.<br>Start a task to begin tracking.</div>';
    statsRow.style.display = 'none';
    return;
  }

  statsRow.style.display = 'grid';

  const avgDelta = logs.reduce((s, e) => s + e.pctDiff, 0) / logs.length;
  const brier = logs.reduce((s, e) => s + Math.pow(e.pctDiff / 100, 2), 0) / logs.length;

  document.getElementById('stat-count').textContent = logs.length;
  document.getElementById('stat-avg').textContent = (avgDelta >= 0 ? '+' : '') + avgDelta.toFixed(1) + '%';
  document.getElementById('stat-bias').textContent = brier.toFixed(3);

  list.innerHTML = logs.map((e, i) => {
    if (i === editingIndex) {
      return `<div class="log-entry log-entry-editing">
        <div>
          <div class="log-edit-label">Task</div>
          <input type="text" id="edit-task" class="edit-input-task" value="${escHtml(e.task)}">
          <div class="log-edit-fields">
            <div>
              <div class="log-edit-label">Est. (min)</div>
              <input type="number" id="edit-pred" class="edit-input-num" value="${(e.predictedMs/60000).toFixed(2)}" min="0.01" step="0.01">
            </div>
            <div>
              <div class="log-edit-label">Actual (min)</div>
              <input type="number" id="edit-actual" class="edit-input-num" value="${(e.actualMs/60000).toFixed(2)}" min="0.01" step="0.01">
            </div>
          </div>
          <div class="log-edit-actions">
            <button class="btn btn-tiny accent" onclick="saveEdit(${i})">Save</button>
            <button class="btn btn-tiny" onclick="cancelEdit()">Cancel</button>
          </div>
        </div>
      </div>`;
    }
    const pct = e.pctDiff;
    const cls = Math.abs(pct) < 2 ? 'exact' : pct > 0 ? 'over' : 'under';
    const sign = pct > 0 ? '+' : '';
    return `<div class="log-entry" id="entry-${e.id}">
      <div>
        <div class="log-task">${escHtml(e.task)}</div>
        <div class="log-meta">${formatDateShort(e.startTime)} · ${formatTime(e.startTime)} – ${formatTime(e.endTime)} · est. ${formatDuration(e.predictedMs)} / actual ${formatDuration(e.actualMs)}</div>
        <div class="entry-actions">
          <button class="btn btn-tiny" onclick="editEntry(${i})">Edit</button>
          <button class="btn btn-tiny danger" onclick="deleteEntry(${i})">Delete</button>
        </div>
      </div>
      <div class="log-delta ${cls}">${sign}${pct.toFixed(1)}%</div>
    </div>`;
  }).join('');
}

function editEntry(i) {
  editingIndex = i;
  renderLog();
}

function cancelEdit() {
  editingIndex = -1;
  renderLog();
}

function saveEdit(i) {
  const task = document.getElementById('edit-task').value.trim();
  const predMin = parseFloat(document.getElementById('edit-pred').value);
  const actualMin = parseFloat(document.getElementById('edit-actual').value);
  if (!task || !(predMin > 0) || !(actualMin > 0)) return;
  logs[i].task = task;
  logs[i].predictedMs = predMin * 60000;
  logs[i].actualMs = actualMin * 60000;
  logs[i].pctDiff = ((logs[i].actualMs - logs[i].predictedMs) / logs[i].predictedMs) * 100;
  editingIndex = -1;
  saveLogs();
  renderLog();
  drawBgGraph();
}

function deleteEntry(i) {
  logs.splice(i, 1);
  if (editingIndex === i) editingIndex = -1;
  else if (editingIndex > i) editingIndex--;
  saveLogs();
  renderLog();
  drawBgGraph();
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportLog() {
  if (logs.length === 0) return;
  const lines = ['Task,Predicted (min),Actual (min),Delta %,Start,End'];
  logs.forEach(e => {
    lines.push([
      `"${e.task.replace(/"/g,'""')}"`,
      (e.predictedMs / 60000).toFixed(2),
      (e.actualMs / 60000).toFixed(2),
      e.pctDiff.toFixed(2),
      new Date(e.startTime).toISOString(),
      new Date(e.endTime).toISOString()
    ].join(','));
  });
  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'meridian_log_' + new Date().toISOString().split('T')[0] + '.csv';
  a.click();
}

function importCSV(input) {
  const file = input.files[0];
  input.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split(/\r?\n/).filter(l => l.trim());
    // skip header row
    const dataLines = lines[0].toLowerCase().startsWith('task') ? lines.slice(1) : lines;
    const imported = [];
    for (const line of dataLines) {
      // parse CSV respecting quoted fields
      const fields = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { fields.push(cur); cur = ''; }
        else cur += ch;
      }
      fields.push(cur);
      if (fields.length < 6) continue;
      const task = fields[0].trim();
      const predMin = parseFloat(fields[1]);
      const actualMin = parseFloat(fields[2]);
      const startTime = new Date(fields[4].trim()).getTime();
      const endTime = new Date(fields[5].trim()).getTime();
      if (!task || isNaN(predMin) || isNaN(actualMin) || isNaN(startTime) || isNaN(endTime)) continue;
      const predictedMs = predMin * 60000;
      const actualMs = actualMin * 60000;
      imported.push({ id: startTime, task, predictedMs, actualMs, pctDiff: ((actualMs - predictedMs) / predictedMs) * 100, startTime, endTime });
    }
    if (!imported.length) { alert('No valid entries found in CSV.'); return; }
    const merge = logs.length > 0 && confirm(`Merge ${imported.length} imported entries with existing log?\nCancel to replace instead.`);
    if (merge) {
      logs = logs.concat(imported).sort((a, b) => b.startTime - a.startTime);
    } else {
      logs = imported.sort((a, b) => b.startTime - a.startTime);
    }
    saveLogs();
    renderLog();
    drawBgGraph();
  };
  reader.readAsText(file);
}

function clearLog() {
  if (!logs.length) return;
  if (!confirm('Clear all log entries?')) return;
  logs = [];
  saveLogs();
  renderLog();
  drawBgGraph();
}


function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

let graphPoints = [];
let hoveredGraphPoint = null;

function drawBgGraph() {
  resizeCanvas();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  graphPoints = [];
  if (logs.length < 2) return;

  const W = canvas.width, H = canvas.height;
  const pts = logs.slice().reverse();
  const pcts = pts.map(e => e.pctDiff);
  const minV = Math.min(...pcts, -20);
  const maxV = Math.max(...pcts, 20);
  const range = maxV - minV || 40;

  const pad = { left: 40, right: 40, top: 60, bottom: 60 };
  const plotW = W - pad.left - pad.right;
  const plotH = H - pad.top - pad.bottom;

  const toX = (i) => pad.left + (i / (pts.length - 1)) * plotW;
  const toY = (v) => pad.top + (1 - (v - minV) / range) * plotH;

  const zeroY = toY(0);

  const isLight = document.body.classList.contains('light');
  const zeroCol  = isLight ? 'rgba(80,73,69,0.35)'   : 'rgba(212,190,152,0.2)';
  const lineCol  = isLight ? 'rgba(121,116,14,0.4)'  : 'rgba(184,187,38,0.25)';
  const fillTop  = isLight ? 'rgba(121,116,14,0.12)' : 'rgba(184,187,38,0.10)';
  const underDot = isLight ? 'rgba(121,116,14,0.85)' : 'rgba(184,187,38,0.75)';
  const overDot  = isLight ? 'rgba(157,0,6,0.75)'    : 'rgba(251,73,52,0.7)';
  const exactDot = isLight ? 'rgba(181,118,20,0.85)' : 'rgba(250,189,47,0.75)';
  const zeroLbl  = isLight ? 'rgba(80,73,69,0.5)'    : 'rgba(212,190,152,0.3)';
  ctx.strokeStyle = zeroCol;
  ctx.lineWidth = 1;
  ctx.setLineDash([4,4]);
  ctx.beginPath();
  ctx.moveTo(pad.left, zeroY);
  ctx.lineTo(W - pad.right, zeroY);
  ctx.stroke();
  ctx.setLineDash([]);

  if (pts.length > 1) {
    ctx.beginPath();
    ctx.moveTo(toX(0), toY(pcts[0]));
    for (let i = 1; i < pts.length; i++) {
      const x0 = toX(i-1), y0 = toY(pcts[i-1]);
      const x1 = toX(i), y1 = toY(pcts[i]);
      const cx = (x0 + x1) / 2;
      ctx.bezierCurveTo(cx, y0, cx, y1, x1, y1);
    }
    ctx.strokeStyle = lineCol;
    ctx.lineWidth = 1.5;
    ctx.stroke();

    const grad = ctx.createLinearGradient(0, pad.top, 0, H - pad.bottom);
    grad.addColorStop(0, fillTop);
    grad.addColorStop(1, 'rgba(184,187,38,0)');
    ctx.lineTo(toX(pts.length-1), zeroY);
    ctx.lineTo(toX(0), zeroY);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();
  }

  pts.forEach((e, i) => {
    const x = toX(i), y = toY(e.pctDiff);
    const isOver = e.pctDiff > 0;
    const color = Math.abs(e.pctDiff) < 2 ? exactDot : isOver ? overDot : underDot;
    const isHovered = hoveredGraphPoint && hoveredGraphPoint.entry === e;
    if (isHovered) {
      ctx.beginPath();
      ctx.arc(x, y, 9, 0, Math.PI * 2);
      ctx.fillStyle = color.replace(/[\d.]+\)$/, '0.15)');
      ctx.fill();
    }
    ctx.beginPath();
    ctx.arc(x, y, isHovered ? 5 : 3.5, 0, Math.PI * 2);
    ctx.fillStyle = color;
    ctx.fill();
    graphPoints.push({ x, y, entry: e });
  });

  ctx.fillStyle = zeroLbl;
  ctx.font = '10px "IBM Plex Mono", monospace';
  ctx.fillText('0%', pad.left - 28, zeroY + 4);
}

function startBackgroundGraph() {
  drawBgGraph();
  canvas.classList.add('active');
}

function stopBackgroundGraph() {
  drawBgGraph();
}

window.addEventListener('resize', () => {
  if (canvas.classList.contains('active') || logs.length > 1) drawBgGraph();
});

document.getElementById('task-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('estimate-input').focus();
});
document.getElementById('estimate-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { e.stopPropagation(); startTimer(); }
});

canvas.addEventListener('click', () => {
  if (hoveredGraphPoint) {
    const entry = hoveredGraphPoint.entry;
    const pct = entry.pctDiff;
    const haloColor = Math.abs(pct) < 2
      ? 'rgba(250,189,47,0.2)'
      : pct > 0 ? 'rgba(251,73,52,0.2)' : 'rgba(184,187,38,0.2)';
    hoveredGraphPoint = null;
    graphTooltip.style.display = 'none';
    document.body.classList.remove('graph-mode');
    setTimeout(() => {
      const el = document.getElementById('entry-' + entry.id);
      if (el) {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => {
          el.style.setProperty('--entry-halo', haloColor);
          el.classList.add('log-entry-highlight');
          el.addEventListener('animationend', () => {
            el.classList.remove('log-entry-highlight');
            el.style.animation = 'none';
          }, { once: true });
        }, 100);
      }
    }, 350);
  } else {
    document.body.classList.toggle('graph-mode');
  }
});

const graphTooltip = document.getElementById('graph-tooltip');
canvas.addEventListener('mousemove', (e) => {
  if (!document.body.classList.contains('graph-mode')) return;
  const mx = e.clientX, my = e.clientY;
  let nearest = null, nearestDist = Infinity;
  for (const pt of graphPoints) {
    const d = Math.hypot(pt.x - mx, pt.y - my);
    if (d < nearestDist) { nearestDist = d; nearest = pt; }
  }
  if (!nearest || nearestDist > 48) {
    if (hoveredGraphPoint !== null) { hoveredGraphPoint = null; drawBgGraph(); }
    graphTooltip.style.display = 'none';
    return;
  }
  if (hoveredGraphPoint !== nearest) { hoveredGraphPoint = nearest; drawBgGraph(); }
  const entry = nearest.entry;
  const pct = entry.pctDiff;
  const sign = pct >= 0 ? '+' : '';
  const cls = Math.abs(pct) < 2 ? 'exact' : pct > 0 ? 'over' : 'under';
  graphTooltip.innerHTML =
    `<div class="tt-task">${escHtml(entry.task)}</div>` +
    `<div class="tt-meta">${formatDateShort(entry.startTime)} · ${formatTime(entry.startTime)} – ${formatTime(entry.endTime)}</div>` +
    `<div class="tt-meta">est. ${formatDuration(entry.predictedMs)} / actual ${formatDuration(entry.actualMs)}</div>` +
    `<div class="tt-delta ${cls}">${sign}${pct.toFixed(1)}%</div>`;

  const tw = 270, th = 90, margin = 12;
  const left = mx + tw + margin > window.innerWidth ? mx - tw - margin : mx + margin;
  const top  = my + th + margin > window.innerHeight ? my - th - margin : my + margin;
  graphTooltip.style.left = left + 'px';
  graphTooltip.style.top  = top  + 'px';
  graphTooltip.style.display = 'block';
});

canvas.addEventListener('mouseleave', () => {
  graphTooltip.style.display = 'none';
  if (hoveredGraphPoint !== null) { hoveredGraphPoint = null; drawBgGraph(); }
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.body.classList.contains('graph-mode')) {
    document.body.classList.remove('graph-mode');
    return;
  }
  const active = document.activeElement;
  const inInput = active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT');
  if (inInput) return;
  if (document.body.matches(':hover') && !document.querySelector('.app').matches(':hover')) return;

  if (e.key === 'Enter') {
    if (timerInterval) {
      e.preventDefault();
      stopTimer();
    } else if (document.getElementById('result-panel').classList.contains('visible')) {
      e.preventDefault();
      clearResult();
    }
  } else if (!e.metaKey && !e.ctrlKey) {
    if (e.key === 'e') { e.preventDefault(); exportLog(); }
    else if (e.key === 'i') { e.preventDefault(); document.getElementById('import-input').click(); }
    else if (e.key === 'c') { e.preventDefault(); clearLog(); }
    else if (e.key === 'l') { e.preventDefault(); applyTheme('light'); localStorage.setItem(THEME_KEY, 'light'); }
    else if (e.key === 'd') { e.preventDefault(); applyTheme('dark');  localStorage.setItem(THEME_KEY, 'dark'); }
    else if (e.key === 's' && timerInterval) { e.preventDefault(); stopTimer(); }
    else if (e.key === 'n' && document.getElementById('result-panel').classList.contains('visible')) { e.preventDefault(); clearResult(); }
  }
});

const BACKUP_KEY = 'meridian_backup_cfg';
let backupCfg = JSON.parse(localStorage.getItem(BACKUP_KEY) || 'null') || {
  enabled: false,
  freq: 'weekly',
  lastBackup: null,
  lastReminder: null,
  useFSAPI: false
};

function saveBackupCfg() {
  localStorage.setItem(BACKUP_KEY, JSON.stringify(backupCfg));
}

function toggleBackup() {
  backupCfg.enabled = !backupCfg.enabled;
  saveBackupCfg();
  renderBackupUI();
}

function setBackupFreq(freq) {
  backupCfg.freq = freq;
  saveBackupCfg();
  renderBackupUI();
  checkBackupDue();
}

function renderBackupUI() {
  const toggle = document.getElementById('backup-toggle');
  const settings = document.getElementById('backup-settings');
  const noteEl = document.getElementById('backup-note');
  const dailyBtn = document.getElementById('freq-daily');
  const weeklyBtn = document.getElementById('freq-weekly');
  const statusEl = document.getElementById('backup-dir-status');

  if (backupCfg.enabled) {
    toggle.classList.add('on');
    settings.style.display = 'block';
  } else {
    toggle.classList.remove('on');
    settings.style.display = 'none';
    return;
  }

  dailyBtn.style.color = backupCfg.freq === 'daily' ? 'var(--accent2)' : '';
  dailyBtn.style.borderColor = backupCfg.freq === 'daily' ? 'var(--accent2-dim)' : '';
  weeklyBtn.style.color = backupCfg.freq === 'weekly' ? 'var(--accent2)' : '';
  weeklyBtn.style.borderColor = backupCfg.freq === 'weekly' ? 'var(--accent2-dim)' : '';

  const hasFSAPI = 'showSaveFilePicker' in window;
  const last = backupCfg.lastBackup ? new Date(backupCfg.lastBackup).toLocaleDateString() : 'never';
  const freqLabel = backupCfg.freq === 'daily' ? 'daily' : 'weekly';

  if (hasFSAPI) {
    noteEl.innerHTML = 'A timestamped CSV will be saved automatically when you open the app and a ' + freqLabel + ' backup is due.<br><br>Last backup: <span style="color:var(--text)">' + last + '</span>';
    statusEl.textContent = '';
  } else {
    noteEl.innerHTML = 'File System API not available — you will receive an in-app reminder to export manually on a ' + freqLabel + ' basis.<br><br>Last backup: <span style="color:var(--text)">' + last + '</span>';
    statusEl.textContent = '';
  }
}

function isBackupDue() {
  if (!backupCfg.enabled || !logs.length) return false;
  if (!backupCfg.lastBackup) return true;
  const now = Date.now();
  const elapsed = now - backupCfg.lastBackup;
  const threshold = backupCfg.freq === 'daily' ? 86400000 : 604800000;
  return elapsed >= threshold;
}

function isReminderSnoozed() {
  if (!backupCfg.lastReminder) return false;
  return (Date.now() - backupCfg.lastReminder) < 3600000;
}

async function checkBackupDue() {
  if (!backupCfg.enabled || !logs.length) return;
  if (!isBackupDue()) return;

  const hasFSAPI = 'showSaveFilePicker' in window;
  if (hasFSAPI) {
    await runBackupNow(true);
  } else {
    if (!isReminderSnoozed()) showReminder();
  }
}

async function runBackupNow(silent = false) {
  if (!logs.length) { if (!silent) alert('No entries to back up.'); return; }
  const hasFSAPI = 'showSaveFilePicker' in window;
  const dateStr = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
  const filename = 'meridian_backup_' + dateStr + '.csv';
  const csvLines = ['Task,Predicted (min),Actual (min),Delta %,Start,End'];
  logs.forEach(e => {
    csvLines.push([
      '"' + e.task.replace(/"/g, '""') + '"',
      (e.predictedMs / 60000).toFixed(2),
      (e.actualMs / 60000).toFixed(2),
      e.pctDiff.toFixed(2),
      new Date(e.startTime).toISOString(),
      new Date(e.endTime).toISOString()
    ].join(','));
  });
  const csvContent = csvLines.join('\n');

  if (hasFSAPI && !silent) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{ description: 'CSV', accept: { 'text/csv': ['.csv'] } }]
      });
      const writable = await handle.createWritable();
      await writable.write(csvContent);
      await writable.close();
    } catch(e) { return; }
  } else {
    const blob = new Blob([csvContent], { type: 'text/csv' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
  }

  backupCfg.lastBackup = Date.now();
  saveBackupCfg();
  hideReminder();
  renderBackupUI();
  const statusEl = document.getElementById('backup-dir-status');
  statusEl.textContent = '✓ Backed up: ' + new Date().toLocaleString();
}

function showReminder() {
  const freqLabel = backupCfg.freq === 'daily' ? 'daily' : 'weekly';
  const last = backupCfg.lastBackup ? new Date(backupCfg.lastBackup).toLocaleDateString() : 'never';
  document.getElementById('reminder-text').innerHTML =
    'Your ' + freqLabel + ' backup is overdue. Last backup: ' + last + '. Export your log to keep a local copy safe.';
  document.getElementById('backup-reminder').style.display = 'block';
}

function hideReminder() {
  document.getElementById('backup-reminder').style.display = 'none';
}

function snoozeReminder() {
  backupCfg.lastReminder = Date.now();
  saveBackupCfg();
  hideReminder();
}

function dismissReminder() {
  backupCfg.lastBackup = Date.now();
  saveBackupCfg();
  hideReminder();
  renderBackupUI();
}

function applyTheme(theme) {
  const btn = document.getElementById('theme-btn');
  if (theme === 'light') {
    document.body.classList.add('light');
    btn.innerHTML = '\u263D <span class="key">D</span>ark';
    document.querySelector('meta[name="theme-color"]').setAttribute('content', '#fbf1c7');
    document.getElementById('favicon').href = ICON_LIGHT_ICO;
    document.getElementById('apple-icon').href = ICON_LIGHT_192;
  } else {
    document.body.classList.remove('light');
    btn.innerHTML = '\u2600 <span class="key">L</span>ight';
    document.querySelector('meta[name="theme-color"]').setAttribute('content', '#1d2021');
    document.getElementById('favicon').href = ICON_DARK_ICO;
    document.getElementById('apple-icon').href = ICON_DARK_192;
  }
  if (logs.length > 1) drawBgGraph();
}
function toggleTheme() {
  const next = document.body.classList.contains('light') ? 'dark' : 'light';
  localStorage.setItem(THEME_KEY, next);
  applyTheme(next);
}
applyTheme(localStorage.getItem(THEME_KEY) || 'dark');
